name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 태그 (예: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            label: linux-x64
            output_name: markup-img
            archive_name: markup-img-${{ inputs.version }}-linux-x64.zip
            neutralino_bin: neutralino-linux_x64
          - target: aarch64-unknown-linux-gnu
            label: linux-arm64
            output_name: markup-img
            archive_name: markup-img-${{ inputs.version }}-linux-arm64.zip
            neutralino_bin: neutralino-linux_arm64
          - target: x86_64-pc-windows-msvc
            label: windows-x64
            output_name: markup-img.exe
            archive_name: markup-img-${{ inputs.version }}-windows-x64.zip
            neutralino_bin: neutralino-win_x64.exe
          - target: x86_64-apple-darwin
            label: macos-x64
            output_name: markup-img
            archive_name: markup-img-${{ inputs.version }}-macos-x64.zip
            neutralino_bin: neutralino-mac_x64
          - target: aarch64-apple-darwin
            label: macos-arm64
            output_name: markup-img
            archive_name: markup-img-${{ inputs.version }}-macos-arm64.zip
            neutralino_bin: neutralino-mac_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Download Neutralino runtimes
        run: deno task download

      - name: Compile target binary
        run: >
          deno compile
          --allow-read
          --allow-write
          --allow-env
          --allow-run
          --allow-net
          --target "${{ matrix.target }}"
          --output "${{ matrix.output_name }}"
          main.ts

      - name: Prepare archive contents
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/${{ matrix.label }}"
          mkdir -p "$package_dir"

          cp "${{ matrix.output_name }}" "$package_dir/"
          cp "${{ matrix.neutralino_bin }}" "$package_dir/"
          cp -R resources "$package_dir/"

      - name: Create zip archive
        shell: bash
        run: |
          set -euo pipefail
          cd dist/${{ matrix.label }}
          zip -r "../${{ matrix.archive_name }}" .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag already exists: $version" >&2
            exit 1
          fi

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          previous_tag="$(git tag --sort=-creatordate | head -n 1 || true)"

          {
            echo "# ${version}"
            echo
            if [ -n "$previous_tag" ]; then
              echo "## Changes since ${previous_tag}"
              echo
              git log --oneline "${previous_tag}..HEAD"
            else
              echo "## Changes"
              echo
              git log --oneline
            fi
          } > RELEASE_NOTES.md

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          git tag "$version"
          git push origin "$version"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ inputs.version }}" \
            release-assets/*.zip \
            --title "${{ inputs.version }}" \
            --notes-file RELEASE_NOTES.md
